<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyLife">
<meta name="theme-color" content="#0b0b12">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>MyLife</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0b12;
    --bg2: #12121e;
    --bg3: #1a1a2e;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8f5;
    --muted: #6060a0;
    --accent: #7c6af7;
    --accent2: #4fc3f7;
    --green: #43d98c;
    --red: #f46a6a;
    --orange: #f7a543;
    --pink: #f06292;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--bg); font-family:'Manrope',sans-serif; color:var(--text); overflow:hidden; }

  /* LAYOUT */
  #app { display:flex; flex-direction:column; height:100dvh; }
  #screen { flex:1; overflow-y:auto; overflow-x:hidden; padding:0 0 16px; scroll-behavior:smooth; }
  #screen::-webkit-scrollbar { display:none; }

  /* NAV */
  nav {
    display:flex; background:rgba(11,11,18,0.95); backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
    padding:8px 0 calc(8px + var(--safe-bottom));
    position:relative; z-index:100;
  }
  .nav-btn {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    background:none; border:none; color:var(--muted); cursor:pointer;
    font-family:'Manrope',sans-serif; font-size:10px; font-weight:600;
    padding:6px 0; transition:color 0.2s; letter-spacing:0.5px;
  }
  .nav-btn .ico { font-size:22px; transition:transform 0.2s; }
  .nav-btn.active { color:var(--accent); }
  .nav-btn.active .ico { transform:scale(1.15); }

  /* PAGES */
  .page { display:none; padding:0 16px; }
  .page.active { display:block; }

  /* HEADER */
  .page-header {
    padding:calc(env(safe-area-inset-top,20px) + 16px) 0 20px;
    position:sticky; top:0; background:var(--bg); z-index:50;
  }
  .page-title { font-size:28px; font-weight:800; letter-spacing:-0.5px; }
  .page-subtitle { font-size:13px; color:var(--muted); margin-top:2px; }

  /* CARDS */
  .card {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:18px; padding:18px; margin-bottom:12px;
  }
  .card-sm { padding:14px; border-radius:14px; }

  /* BUTTONS */
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:12px 20px; border-radius:12px; border:none; cursor:pointer;
    font-family:'Manrope',sans-serif; font-weight:700; font-size:14px;
    transition:all 0.2s; -webkit-user-select:none;
  }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:active { opacity:0.8; transform:scale(0.97); }
  .btn-ghost { background:rgba(255,255,255,0.06); color:var(--text); border:1px solid var(--border); }
  .btn-danger { background:rgba(244,106,106,0.15); color:var(--red); border:1px solid rgba(244,106,106,0.2); }
  .btn-full { width:100%; }

  /* INPUTS */
  input, select, textarea {
    background:rgba(255,255,255,0.05); border:1px solid var(--border);
    border-radius:12px; padding:12px 14px; color:var(--text);
    font-family:'Manrope',sans-serif; font-size:15px; width:100%;
    outline:none; transition:border-color 0.2s; -webkit-appearance:none;
  }
  input:focus, select:focus, textarea:focus { border-color:var(--accent); }
  input::placeholder, textarea::placeholder { color:var(--muted); }
  select option { background:#1a1a2e; }

  /* PILLS */
  .pill {
    display:inline-flex; align-items:center; padding:4px 10px;
    border-radius:99px; font-size:11px; font-weight:700; letter-spacing:0.5px;
  }
  .pill-green { background:rgba(67,217,140,0.15); color:var(--green); }
  .pill-red { background:rgba(244,106,106,0.15); color:var(--red); }
  .pill-orange { background:rgba(247,165,67,0.15); color:var(--orange); }
  .pill-blue { background:rgba(79,195,247,0.15); color:var(--accent2); }
  .pill-purple { background:rgba(124,106,247,0.15); color:var(--accent); }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px);
    z-index:200; display:none; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:24px 24px 0 0; padding:24px 20px calc(24px + var(--safe-bottom));
    width:100%; max-width:520px; max-height:90dvh; overflow-y:auto;
    animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:none} }
  .modal-title { font-size:20px; font-weight:800; margin-bottom:20px; }

  /* FORM GROUP */
  .fg { margin-bottom:14px; }
  .fg label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px; letter-spacing:0.5px; text-transform:uppercase; }

  /* ROW */
  .row { display:flex; gap:10px; align-items:center; }
  .row-between { display:flex; justify-content:space-between; align-items:center; }

  /* PROGRESS BAR */
  .progress-track { height:6px; background:rgba(255,255,255,0.08); border-radius:99px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:99px; transition:width 0.4s cubic-bezier(0.4,0,0.2,1); }

  /* STAT GRID */
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat-card {
    background:var(--bg3); border:1px solid var(--border);
    border-radius:14px; padding:14px;
  }
  .stat-label { font-size:11px; color:var(--muted); font-weight:700; letter-spacing:0.5px; text-transform:uppercase; }
  .stat-value { font-size:22px; font-weight:800; margin-top:4px; letter-spacing:-0.5px; }

  /* CHECKLIST ITEM */
  .check-item {
    display:flex; align-items:center; gap:12px; padding:14px 16px;
    background:var(--bg2); border:1px solid var(--border);
    border-radius:14px; margin-bottom:8px; cursor:pointer; transition:all 0.25s;
  }
  .check-item.done { opacity:0.5; }
  .checkbox {
    width:24px; height:24px; border-radius:8px; border:2px solid rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:all 0.25s; font-size:14px;
  }
  .check-item.done .checkbox {
    background:var(--accent); border-color:var(--accent);
    box-shadow:0 0 12px rgba(124,106,247,0.4);
  }

  /* TASK ITEM */
  .task-item {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:14px; padding:14px 16px; margin-bottom:8px;
  }
  .task-item.done-task { opacity:0.45; }
  .task-title { font-size:15px; font-weight:600; }
  .task-meta { font-size:12px; color:var(--muted); margin-top:4px; }

  /* FIN ITEM */
  .fin-item {
    display:flex; align-items:center; gap:12px;
    padding:12px 0; border-bottom:1px solid var(--border);
  }
  .fin-item:last-child { border-bottom:none; }
  .fin-dot { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .fin-info { flex:1; min-width:0; }
  .fin-name { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fin-date { font-size:11px; color:var(--muted); margin-top:2px; }
  .fin-amount { font-size:15px; font-weight:800; }

  /* CATEGORY CHIPS */
  .chip-row { display:flex; gap:6px; flex-wrap:wrap; }
  .chip {
    padding:6px 12px; border-radius:99px; font-size:12px; font-weight:700;
    border:1px solid var(--border); background:var(--bg3); cursor:pointer;
    transition:all 0.2s; color:var(--muted);
  }
  .chip.selected { background:var(--accent); border-color:var(--accent); color:#fff; }

  /* EMPTY STATE */
  .empty { text-align:center; padding:40px 20px; color:var(--muted); }
  .empty .emoji { font-size:40px; margin-bottom:10px; }

  /* CHART */
  .chart-bar-wrap { display:flex; align-items:flex-end; gap:6px; height:80px; }
  .chart-bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; }
  .chart-bar-inner { flex:1; display:flex; align-items:flex-end; width:100%; }
  .chart-bar { width:100%; border-radius:6px 6px 0 0; min-height:4px; transition:height 0.5s cubic-bezier(0.4,0,0.2,1); }
  .chart-label { font-size:9px; color:var(--muted); font-weight:600; }

  /* DELETE BTN */
  .del-btn {
    background:none; border:none; color:var(--muted); font-size:18px;
    cursor:pointer; padding:4px 8px; border-radius:8px; transition:all 0.2s;
  }
  .del-btn:active { color:var(--red); background:rgba(244,106,106,0.1); }

  /* TOGGLE */
  .toggle-row { display:flex; background:var(--bg3); border-radius:12px; padding:3px; margin-bottom:16px; }
  .toggle-btn { flex:1; padding:8px; border-radius:9px; border:none; background:none; color:var(--muted); font-family:'Manrope',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .toggle-btn.active { background:var(--accent); color:#fff; }

  /* PRIORITY DOT */
  .p-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .p-high { background:var(--red); }
  .p-mid  { background:var(--orange); }
  .p-low  { background:var(--green); }

  /* ANIMATIONS */
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .fade-in { animation:fadeIn 0.3s ease both; }

  /* IOS safe areas */
  .page { padding-top:0; }
</style>
</head>
<body>
<div id="app">
  <div id="screen">

    <!-- ═══════════════ ФИНАНСЫ ═══════════════ -->
    <div class="page active" id="page-finance">
      <div class="page-header" style="padding-left:16px;padding-right:16px;">
        <div class="row-between">
          <div>
            <div class="page-title">💰 Финансы</div>
            <div class="page-subtitle" id="fin-month-label"></div>
          </div>
          <button class="btn btn-primary" onclick="openModal('modal-fin')" style="padding:10px 16px;font-size:13px;">+ Добавить</button>
        </div>
      </div>

      <div style="padding:0 16px;">
        <!-- Balance card -->
        <div class="card" style="background:linear-gradient(135deg,#1a0e3a,#0e2040);border-color:rgba(124,106,247,0.2);margin-bottom:12px;">
          <div style="font-size:12px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;">Баланс</div>
          <div id="fin-balance" style="font-size:38px;font-weight:800;letter-spacing:-1px;margin:6px 0;"></div>
          <div class="stat-grid" style="margin-top:4px;">
            <div>
              <div style="font-size:11px;color:var(--green);font-weight:700;">▲ Доходы</div>
              <div id="fin-income" style="font-size:18px;font-weight:800;color:var(--green);"></div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--red);font-weight:700;">▼ Расходы</div>
              <div id="fin-expense" style="font-size:18px;font-weight:800;color:var(--red);"></div>
            </div>
          </div>
        </div>

        <!-- Chart -->
        <div class="card card-sm">
          <div style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;">Последние 7 дней</div>
          <div class="chart-bar-wrap" id="fin-chart"></div>
        </div>

        <!-- Category breakdown -->
        <div id="fin-cats-block" class="card card-sm">
          <div style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;">По категориям</div>
          <div id="fin-cats"></div>
        </div>

        <!-- Transactions -->
        <div class="card card-sm">
          <div class="row-between" style="margin-bottom:12px;">
            <div style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;">Операции</div>
          </div>
          <div id="fin-list"></div>
        </div>
      </div>
    </div>

    <!-- ═══════════════ ЗАДАЧНИК ═══════════════ -->
    <div class="page" id="page-tasks">
      <div class="page-header" style="padding-left:16px;padding-right:16px;">
        <div class="row-between">
          <div>
            <div class="page-title">📋 Задачи</div>
            <div class="page-subtitle" id="tasks-counter"></div>
          </div>
          <button class="btn btn-primary" onclick="openModal('modal-task')" style="padding:10px 16px;font-size:13px;">+ Новая</button>
        </div>
      </div>
      <div style="padding:0 16px;">
        <div class="toggle-row">
          <button class="toggle-btn active" id="tfilter-all" onclick="setTaskFilter('all')">Все</button>
          <button class="toggle-btn" id="tfilter-active" onclick="setTaskFilter('active')">Активные</button>
          <button class="toggle-btn" id="tfilter-done' onclick="setTaskFilter('done')">Готовые</button>
        </div>
        <div id="tasks-list"></div>
      </div>
    </div>

    <!-- ═══════════════ ЧЕК-ЛИСТ ═══════════════ -->
    <div class="page" id="page-check">
      <div class="page-header" style="padding-left:16px;padding-right:16px;">
        <div class="row-between">
          <div>
            <div class="page-title">✅ День</div>
            <div class="page-subtitle" id="check-date"></div>
          </div>
          <button class="btn btn-ghost" onclick="openModal('modal-check-add')" style="padding:10px 16px;font-size:13px;">+ Привычка</button>
        </div>
        <div style="margin-top:12px;">
          <div class="row-between" style="margin-bottom:6px;">
            <span style="font-size:13px;color:var(--muted);" id="check-progress-label"></span>
            <span style="font-size:13px;font-weight:800;" id="check-pct"></span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="check-bar" style="background:linear-gradient(90deg,var(--accent),var(--accent2));"></div>
          </div>
        </div>
      </div>
      <div style="padding:0 16px;">
        <div id="check-list"></div>
        <div id="check-congrats" style="display:none;" class="card" style="text-align:center;background:rgba(67,217,140,0.08);border-color:rgba(67,217,140,0.2);">
          <div style="text-align:center;font-size:32px;margin-bottom:6px;">🎉</div>
          <div style="font-weight:800;color:var(--green);">Отличный день!</div>
          <div style="font-size:13px;color:var(--muted);margin-top:4px;">Все задачи выполнены</div>
        </div>
        <button onclick="resetDay()" style="width:100%;margin-top:4px;padding:10px;background:none;border:1px solid var(--border);border-radius:12px;color:var(--muted);font-family:'Manrope',sans-serif;font-size:13px;cursor:pointer;">Сбросить день</button>
      </div>
    </div>

  </div>

  <!-- NAV -->
  <nav>
    <button class="nav-btn active" id="nav-finance" onclick="showPage('finance')">
      <span class="ico">💰</span>Финансы
    </button>
    <button class="nav-btn" id="nav-tasks" onclick="showPage('tasks')">
      <span class="ico">📋</span>Задачи
    </button>
    <button class="nav-btn" id="nav-check" onclick="showPage('check')">
      <span class="ico">✅</span>День
    </button>
  </nav>
</div>

<!-- ═══ MODAL: Финансы ═══ -->
<div class="modal-overlay" id="modal-fin" onclick="if(event.target===this)closeModal('modal-fin')">
  <div class="modal">
    <div class="modal-title">Новая операция</div>
    <div class="fg">
      <label>Тип</label>
      <div class="toggle-row" style="margin-bottom:0;">
        <button class="toggle-btn active" id="ftype-exp" onclick="setFinType('expense')">Расход</button>
        <button class="toggle-btn" id="ftype-inc" onclick="setFinType('income')">Доход</button>
      </div>
    </div>
    <div class="fg">
      <label>Сумма (₽)</label>
      <input type="number" id="fin-amount-inp" placeholder="0" inputmode="decimal">
    </div>
    <div class="fg">
      <label>Категория</label>
      <select id="fin-cat-inp"></select>
    </div>
    <div class="fg">
      <label>Описание</label>
      <input type="text" id="fin-desc-inp" placeholder="Что за операция?">
    </div>
    <div class="fg">
      <label>Дата</label>
      <input type="date" id="fin-date-inp">
    </div>
    <div class="row" style="gap:10px;margin-top:4px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeModal('modal-fin')">Отмена</button>
      <button class="btn btn-primary" style="flex:2;" onclick="addTransaction()">Сохранить</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: Задача ═══ -->
<div class="modal-overlay" id="modal-task" onclick="if(event.target===this)closeModal('modal-task')">
  <div class="modal">
    <div class="modal-title">Новая задача</div>
    <div class="fg">
      <label>Название</label>
      <input type="text" id="task-title-inp" placeholder="Что нужно сделать?">
    </div>
    <div class="fg">
      <label>Описание</label>
      <textarea id="task-desc-inp" placeholder="Детали (необязательно)" rows="2" style="resize:none;"></textarea>
    </div>
    <div class="fg">
      <label>Приоритет</label>
      <div class="chip-row" id="priority-chips">
        <div class="chip selected" data-p="high" onclick="selectPriority('high')">🔴 Высокий</div>
        <div class="chip" data-p="mid" onclick="selectPriority('mid')">🟠 Средний</div>
        <div class="chip" data-p="low" onclick="selectPriority('low')">🟢 Низкий</div>
      </div>
    </div>
    <div class="fg">
      <label>Дедлайн</label>
      <input type="date" id="task-deadline-inp">
    </div>
    <div class="fg">
      <label>Категория</label>
      <input type="text" id="task-cat-inp" placeholder="Работа, Личное, Учёба...">
    </div>
    <div class="row" style="gap:10px;margin-top:4px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeModal('modal-task')">Отмена</button>
      <button class="btn btn-primary" style="flex:2;" onclick="addTask()">Добавить</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: Привычка ═══ -->
<div class="modal-overlay" id="modal-check-add" onclick="if(event.target===this)closeModal('modal-check-add')">
  <div class="modal">
    <div class="modal-title">Новая привычка</div>
    <div class="fg">
      <label>Иконка</label>
      <div class="chip-row" id="emoji-chips" style="font-size:22px;gap:8px;">
        <span class="chip selected" data-e="💪" onclick="selectEmoji('💪')">💪</span>
        <span class="chip" data-e="📚" onclick="selectEmoji('📚')">📚</span>
        <span class="chip" data-e="🏃" onclick="selectEmoji('🏃')">🏃</span>
        <span class="chip" data-e="💧" onclick="selectEmoji('💧')">💧</span>
        <span class="chip" data-e="🧘" onclick="selectEmoji('🧘')">🧘</span>
        <span class="chip" data-e="🌿" onclick="selectEmoji('🌿')">🌿</span>
        <span class="chip" data-e="🍎" onclick="selectEmoji('🍎')">🍎</span>
        <span class="chip" data-e="✍️" onclick="selectEmoji('✍️')">✍️</span>
        <span class="chip" data-e="😴" onclick="selectEmoji('😴')">😴</span>
        <span class="chip" data-e="🎯" onclick="selectEmoji('🎯')">🎯</span>
      </div>
    </div>
    <div class="fg">
      <label>Название</label>
      <input type="text" id="check-name-inp" placeholder="Название привычки">
    </div>
    <div class="row" style="gap:10px;margin-top:4px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeModal('modal-check-add')">Отмена</button>
      <button class="btn btn-primary" style="flex:2;" onclick="addHabit()">Добавить</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//   STATE
// ═══════════════════════════════════════════════
const S = {
  transactions: load('transactions') || [],
  tasks: load('tasks') || [],
  habits: load('habits') || [
    {id:1,icon:'🏃',name:'Зарядка / спорт'},
    {id:2,icon:'💧',name:'Вода (8 стаканов)'},
    {id:3,icon:'📚',name:'Чтение (30 мин)'},
    {id:4,icon:'🧘',name:'Медитация'},
    {id:5,icon:'😴',name:'Сон до 23:00'},
  ],
  checked: load(todayKey()) || [],
  finType: 'expense',
  taskFilter: 'all',
  selPriority: 'high',
  selEmoji: '💪',
};

const FIN_CATS = {
  expense: ['🍔 Еда','🚗 Транспорт','🏠 Жильё','👕 Одежда','💊 Здоровье','🎮 Развлечения','📱 Связь','🛒 Покупки','💰 Прочее'],
  income:  ['💼 Зарплата','💡 Фриланс','📈 Инвестиции','🎁 Подарок','💵 Прочее'],
};

const MONTHS = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const DAYS_S = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const MONTHS_S = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

// ═══════════════════════════════════════════════
//   UTILS
// ═══════════════════════════════════════════════
function load(k){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null} }
function save(k,v){ try{localStorage.setItem(k,JSON.stringify(v))}catch{} }
function todayKey(){ const d=new Date(); return `checked-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function uid(){ return Date.now()+Math.random().toString(36).slice(2); }
function fmt(n){ return new Intl.NumberFormat('ru-RU').format(Math.round(n))+'₽'; }
function fmtDate(s){ const d=new Date(s); return `${d.getDate()} ${MONTHS_S[d.getMonth()]}`; }
function today(){ const d=new Date(); return d.toISOString().slice(0,10); }

// ═══════════════════════════════════════════════
//   NAV
// ═══════════════════════════════════════════════
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  document.getElementById('screen').scrollTop=0;
  if(name==='finance') renderFinance();
  if(name==='tasks') renderTasks();
  if(name==='check') renderCheck();
}

// ═══════════════════════════════════════════════
//   MODALS
// ═══════════════════════════════════════════════
function openModal(id){
  if(id==='modal-fin'){
    const sel=document.getElementById('fin-cat-inp');
    sel.innerHTML=FIN_CATS[S.finType].map(c=>`<option>${c}</option>`).join('');
    document.getElementById('fin-date-inp').value=today();
  }
  document.getElementById(id).classList.add('open');
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// ═══════════════════════════════════════════════
//   FINANCE
// ═══════════════════════════════════════════════
function setFinType(t){
  S.finType=t;
  document.getElementById('ftype-exp').classList.toggle('active',t==='expense');
  document.getElementById('ftype-inc').classList.toggle('active',t==='income');
  const sel=document.getElementById('fin-cat-inp');
  sel.innerHTML=FIN_CATS[t].map(c=>`<option>${c}</option>`).join('');
}

function addTransaction(){
  const amt=parseFloat(document.getElementById('fin-amount-inp').value);
  if(!amt||amt<=0){alert('Введите сумму');return;}
  S.transactions.unshift({
    id:uid(), type:S.finType,
    amount:amt,
    cat:document.getElementById('fin-cat-inp').value,
    desc:document.getElementById('fin-desc-inp').value||'',
    date:document.getElementById('fin-date-inp').value||today(),
  });
  save('transactions',S.transactions);
  closeModal('modal-fin');
  document.getElementById('fin-amount-inp').value='';
  document.getElementById('fin-desc-inp').value='';
  renderFinance();
}

function delTransaction(id){
  S.transactions=S.transactions.filter(t=>t.id!==id);
  save('transactions',S.transactions);
  renderFinance();
}

function renderFinance(){
  const now=new Date();
  document.getElementById('fin-month-label').textContent=MONTHS[now.getMonth()]+' '+now.getFullYear();

  const inc=S.transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=S.transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;

  document.getElementById('fin-balance').textContent=(bal>=0?'+':'')+fmt(bal);
  document.getElementById('fin-balance').style.color=bal>=0?'var(--green)':'var(--red)';
  document.getElementById('fin-income').textContent='+'+fmt(inc);
  document.getElementById('fin-expense').textContent='-'+fmt(exp);

  // Chart — last 7 days
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const dayExp=S.transactions.filter(t=>t.type==='expense'&&t.date===key).reduce((s,t)=>s+t.amount,0);
    const dayInc=S.transactions.filter(t=>t.type==='income'&&t.date===key).reduce((s,t)=>s+t.amount,0);
    days.push({label:DAYS_S[d.getDay()],exp:dayExp,inc:dayInc});
  }
  const maxVal=Math.max(...days.map(d=>Math.max(d.exp,d.inc)),1);
  document.getElementById('fin-chart').innerHTML=days.map(d=>`
    <div class="chart-bar-col">
      <div class="chart-bar-inner" style="flex-direction:column;justify-content:flex-end;gap:2px;">
        ${d.inc>0?`<div class="chart-bar" style="height:${Math.round(d.inc/maxVal*100)}%;background:var(--green);opacity:0.8;"></div>`:''}
        ${d.exp>0?`<div class="chart-bar" style="height:${Math.round(d.exp/maxVal*100)}%;background:var(--red);opacity:0.8;"></div>`:'<div class="chart-bar" style="height:4px;background:rgba(255,255,255,0.08);"></div>'}
      </div>
      <div class="chart-label">${d.label}</div>
    </div>
  `).join('');

  // Categories
  const catExp={};
  S.transactions.filter(t=>t.type==='expense').forEach(t=>{ catExp[t.cat]=(catExp[t.cat]||0)+t.amount; });
  const catList=Object.entries(catExp).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCat=catList[0]?catList[0][1]:1;
  document.getElementById('fin-cats').innerHTML=catList.length?catList.map(([cat,amt])=>`
    <div style="margin-bottom:12px;">
      <div class="row-between" style="margin-bottom:5px;">
        <span style="font-size:13px;">${cat}</span>
        <span style="font-size:13px;font-weight:700;color:var(--red);">${fmt(amt)}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${Math.round(amt/maxCat*100)}%;background:var(--red);opacity:0.7;"></div></div>
    </div>
  `).join(''):'<div style="color:var(--muted);font-size:13px;">Нет расходов</div>';

  // List
  const list=document.getElementById('fin-list');
  if(!S.transactions.length){
    list.innerHTML='<div class="empty"><div class="emoji">💸</div><div>Нет операций</div></div>';
    return;
  }
  list.innerHTML=S.transactions.slice(0,20).map(t=>`
    <div class="fin-item fade-in">
      <div class="fin-dot" style="background:${t.type==='income'?'rgba(67,217,140,0.12)':'rgba(244,106,106,0.12)'};">${t.cat.split(' ')[0]}</div>
      <div class="fin-info">
        <div class="fin-name">${t.desc||t.cat}</div>
        <div class="fin-date">${fmtDate(t.date)} · ${t.cat}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="fin-amount" style="color:${t.type==='income'?'var(--green)':'var(--red)'};">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
        <button class="del-btn" onclick="delTransaction('${t.id}')">×</button>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
//   TASKS
// ═══════════════════════════════════════════════
function selectPriority(p){
  S.selPriority=p;
  document.querySelectorAll('#priority-chips .chip').forEach(c=>{
    c.classList.toggle('selected',c.dataset.p===p);
  });
}

function addTask(){
  const title=document.getElementById('task-title-inp').value.trim();
  if(!title){alert('Введите название');return;}
  S.tasks.unshift({
    id:uid(), title,
    desc:document.getElementById('task-desc-inp').value.trim(),
    priority:S.selPriority,
    deadline:document.getElementById('task-deadline-inp').value,
    cat:document.getElementById('task-cat-inp').value.trim()||'Общее',
    done:false,
    created:today(),
  });
  save('tasks',S.tasks);
  closeModal('modal-task');
  document.getElementById('task-title-inp').value='';
  document.getElementById('task-desc-inp').value='';
  document.getElementById('task-deadline-inp').value='';
  document.getElementById('task-cat-inp').value='';
  renderTasks();
}

function toggleTask(id){
  const t=S.tasks.find(t=>t.id===id);
  if(t){ t.done=!t.done; save('tasks',S.tasks); renderTasks(); }
}

function delTask(id){
  S.tasks=S.tasks.filter(t=>t.id!==id);
  save('tasks',S.tasks);
  renderTasks();
}

function setTaskFilter(f){
  S.taskFilter=f;
  document.querySelectorAll('.toggle-btn[id^=tfilter]').forEach(b=>b.classList.remove('active'));
  document.getElementById('tfilter-'+f).classList.add('active');
  renderTasks();
}

function renderTasks(){
  const active=S.tasks.filter(t=>!t.done).length;
  const total=S.tasks.length;
  document.getElementById('tasks-counter').textContent=`${active} активных · ${total} всего`;

  let filtered=S.tasks;
  if(S.taskFilter==='active') filtered=S.tasks.filter(t=>!t.done);
  if(S.taskFilter==='done') filtered=S.tasks.filter(t=>t.done);

  const list=document.getElementById('tasks-list');
  if(!filtered.length){
    list.innerHTML='<div class="empty"><div class="emoji">📋</div><div>Нет задач</div></div>';
    return;
  }
  const pcolor={high:'var(--red)',mid:'var(--orange)',low:'var(--green)'};
  const plabel={high:'Высокий',mid:'Средний',low:'Низкий'};
  list.innerHTML=filtered.map(t=>`
    <div class="task-item fade-in ${t.done?'done-task':''}">
      <div class="row-between" style="margin-bottom:6px;">
        <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
          <div class="p-dot p-${t.priority}"></div>
          <div class="task-title" style="${t.done?'text-decoration:line-through;':''};flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.title}</div>
        </div>
        <div style="display:flex;gap:6px;margin-left:8px;flex-shrink:0;">
          <button class="btn btn-ghost" style="padding:6px 10px;font-size:12px;" onclick="toggleTask('${t.id}')">${t.done?'↩ Вернуть':'✓ Готово'}</button>
          <button class="del-btn" onclick="delTask('${t.id}')">×</button>
        </div>
      </div>
      ${t.desc?`<div class="task-meta">${t.desc}</div>`:''}
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
        <span class="pill pill-purple">${t.cat}</span>
        <span class="pill" style="background:${pcolor[t.priority]}22;color:${pcolor[t.priority]};">${plabel[t.priority]}</span>
        ${t.deadline?`<span class="pill pill-blue">📅 ${fmtDate(t.deadline)}</span>`:''}
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
//   CHECKLIST
// ═══════════════════════════════════════════════
function selectEmoji(e){
  S.selEmoji=e;
  document.querySelectorAll('#emoji-chips .chip').forEach(c=>c.classList.toggle('selected',c.dataset.e===e));
}

function addHabit(){
  const name=document.getElementById('check-name-inp').value.trim();
  if(!name){alert('Введите название');return;}
  S.habits.push({id:uid(),icon:S.selEmoji,name});
  save('habits',S.habits);
  closeModal('modal-check-add');
  document.getElementById('check-name-inp').value='';
  renderCheck();
}

function toggleCheck(id){
  if(S.checked.includes(id)) S.checked=S.checked.filter(x=>x!==id);
  else S.checked.push(id);
  save(todayKey(),S.checked);
  renderCheck();
}

function delHabit(id){
  S.habits=S.habits.filter(h=>h.id!==id);
  S.checked=S.checked.filter(x=>x!==id);
  save('habits',S.habits);
  save(todayKey(),S.checked);
  renderCheck();
}

function resetDay(){
  S.checked=[];
  save(todayKey(),[]);
  renderCheck();
}

function renderCheck(){
  const d=new Date();
  document.getElementById('check-date').textContent=
    `${d.getDate()} ${MONTHS[d.getMonth()]}, ${DAYS_S[d.getDay()]}`;

  const total=S.habits.length;
  const done=S.checked.length;
  const pct=total?Math.round(done/total*100):0;

  document.getElementById('check-progress-label').textContent=`${done} из ${total} выполнено`;
  document.getElementById('check-pct').textContent=pct+'%';
  document.getElementById('check-pct').style.color=pct===100?'var(--green)':'var(--accent)';
  document.getElementById('check-bar').style.width=pct+'%';
  document.getElementById('check-congrats').style.display=pct===100&&total>0?'block':'none';

  const list=document.getElementById('check-list');
  if(!S.habits.length){
    list.innerHTML='<div class="empty"><div class="emoji">✅</div><div>Добавь первую привычку!</div></div>';
    return;
  }
  list.innerHTML=S.habits.map(h=>{
    const isDone=S.checked.includes(h.id);
    return `
      <div class="check-item ${isDone?'done':''}" onclick="toggleCheck('${h.id}')">
        <div class="checkbox">${isDone?'✓':''}</div>
        <span style="font-size:22px;">${h.icon}</span>
        <span style="flex:1;font-size:15px;font-weight:600;${isDone?'text-decoration:line-through;':''}">${h.name}</span>
        <button class="del-btn" onclick="event.stopPropagation();delHabit('${h.id}')">×</button>
      </div>
    `;
  }).join('');
}

// ═══════════════════════════════════════════════
//   INIT
// ═══════════════════════════════════════════════
renderFinance();
</script>
</body>
</html>
